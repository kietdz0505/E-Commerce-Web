name: E-Commerce CI/CD Flow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # 1. KIỂM TRA BACKEND (SPRING BOOT)
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập Java JDK 21 
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Biên dịch và Kiểm tra Backend với Maven
      run: |
        cd ecommerce-backend
        mvn clean package -DskipTests

    - name: Kích hoạt Render Deploy Hook
      if: success()
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # 2. KIỂM TRA FRONTEND (REACTJS)
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập NodeJS 22 
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: ecommerce-frontend/package-lock.json

    - name: Cài đặt thư viện và Build thử Frontend
      run: |
        cd ecommerce-frontend
        npm install
        npm run build